<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Best productivity web app for project
      management">
  <title>TaskFlow - Boost Your Productivity</title>

  <link rel="canonical" href="https://apptaskflow.netlify.app/" />
  <meta name="google-site-verification" content="PiTFbxqhcUCICp3CiumLJER3KLBWSdzAwQMItRqIymM" />

  <link rel="preconnect" href="https://taskflow-ef99b.firebaseapp.com">
  <link rel="preconnect" href="https://apis.google.com">

  <link rel="preload" href="/fonts/Rubik-VariableFont_wght.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="icon" href="taskflow-logo-dark.svg" type="image/svg+xml">

  <meta property="og:title" content="TaskFlow - Boost Your Productivity">
  <meta property="og:description" content="Bring your ideas to life. Manage projects solo or with your team.">
  <meta property="og:image" content="https://apptaskflow.netlify.app/taskflow-logo.png">
  <meta property="og:url" content="https://apptaskflow.netlify.app">
  <meta property="og:type" content="website">

  <style>
    #root {
      min-height: 100dvh;
      flex-direction: column
    }

    :root,
    body {
      overflow-x: hidden
    }

    :root {
      --fs-tiny: clamp(.6rem, .6rem + 1vw, .8rem);
      --fs-small: clamp(.75rem, .75rem + 2.5vw, .95rem);
      --fs-medium: clamp(.9rem, .9rem + 2.5vw, 1.15rem);
      min-height: 100dvh
    }

    img {
      max-width: 100%;
      height: auto;
      vertical-align: middle
    }

    @media only screen and (min-width: 75rem) {
      :root {
        font-size: clamp(16px, 16px + .25vw, 22px)
      }
    }

    .flex {
      display: flex
    }

    .flex-wrap {
      flex-wrap: wrap
    }

    .flex-grow {
      flex-grow: 1
    }

    .flex-column {
      flex-direction: column
    }

    .flex-center {
      justify-content: center;
      align-items: center
    }

    .text-center {
      text-align: center
    }

    .text-balance {
      text-wrap: balance
    }

    .relative {
      position: relative
    }

    .absolute {
      position: absolute
    }
  </style>

</head>

<body>
  <div id="root" class='flex'></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
